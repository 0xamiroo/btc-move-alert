<!DOCTYPE html>
<html>

<head>
<title>0xAmiroo BTC Watcher</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.price{
font-size:60px;
margin-top:30px;
}

.log{
margin-top:40px;
max-width:500px;
margin-left:auto;
margin-right:auto;
text-align:left;
}
</style>

</head>

<body>

<h1>0xAmiroo BTC Volatility Watcher</h1>

<div id="price" class="price">Loading...</div>

<div id="log" class="log"></div>

<script>

const api="https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"

let lastPrice=null

async function checkPrice(){

try{

const res=await fetch(api)
const data=await res.json()

const price=data.bitcoin.usd

document.getElementById("price").innerText="$"+price

if(lastPrice){

let change=((price-lastPrice)/lastPrice)*100

if(Math.abs(change)>=0.05){

let div=document.createElement("div")

div.innerText="⚡ BTC moved "+change.toFixed(2)+"% → $"+price

document.getElementById("log").prepend(div)

}

}

lastPrice=price

}catch(e){

document.getElementById("price").innerText="API error"

}

}

checkPrice()

setInterval(checkPrice,15000)

</script>

</body>

</html>
