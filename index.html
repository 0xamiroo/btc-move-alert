<!DOCTYPE html>
<html>
<head>
<title>0xAmiroo BTC Move Alert</title>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
text-align:center;
padding:40px;
}

.price{
font-size:48px;
margin:20px;
}

.log{
margin-top:40px;
text-align:left;
max-width:500px;
margin:auto;
}
</style>

</head>

<body>

<h1>0xAmiroo BTC Volatility Watcher</h1>

<div class="price" id="price">
Loading...
</div>

<div class="log" id="log"></div>

<script>

const api="https://api.allorigins.win/raw?url=https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"

let lastPrice=null

async function checkPrice(){

try{

const res=await fetch(api)

const data=await res.json()

const price=data.bitcoin.usd

document.getElementById("price").innerText="$"+price

if(lastPrice){

let change=((price-lastPrice)/lastPrice)*100

if(Math.abs(change)>=0.05){

let msg="⚡ BTC moved "+change.toFixed(2)+"% → $"+price

let div=document.createElement("div")
div.innerText=msg

document.getElementById("log").prepend(div)

new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()

}

}

lastPrice=price

}catch(e){

document.getElementById("price").innerText="API error"

}

}

checkPrice()

setInterval(checkPrice,20000)

</script>

</body>
</html>
