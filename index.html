<!DOCTYPE html>
<html>

<head>
<title>0xAmiroo BTC Watcher</title>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
text-align:center;
padding:40px;
}

.price{
font-size:50px;
margin:30px;
}

.log{
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
text-align:left;
}
</style>

</head>

<body>

<h1>BTC Price Watcher</h1>

<div id="price" class="price">Loading...</div>

<div id="log" class="log"></div>

<script>

const api="https://latch-beta.rialo.io/proxy/lnk_06f8569940574744/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"

const token="lat_446c2f89de75d53a24c68d7368372d5b4a1e49aee9c225c8d46d904699cb4888"

let lastPrice=null

async function checkPrice(){

try{

const res=await fetch(api,{
headers:{
"Authorization":"Bearer "+token
}
})

const data=await res.json()

const price=data.bitcoin.usd

document.getElementById("price").innerText="$"+price

if(lastPrice){

let change=((price-lastPrice)/lastPrice)*100

if(Math.abs(change)>=0.05){

let div=document.createElement("div")

div.innerText="⚡ BTC moved "+change.toFixed(2)+"% → $"+price

document.getElementById("log").prepend(div)

}

}

lastPrice=price

}catch(e){

document.getElementById("price").innerText="API error"

}

}

checkPrice()

setInterval(checkPrice,20000)

</script>

</body>

</html>
